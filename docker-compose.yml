  version: '3'
  services: 
    backend:
      build:
        context: ./backend
      ports:
        - "5000:5000"
      networks:
        - mern-network
      

    frontend: 
      build: 
        context: ./frontend
      ports:
        - "80:80"
    
    mongo:
      image: mongo:latest
      ports:
        - "27017:27017"
      networks:
        - mern-network
      volumes:
        - mongo-data:/data/db
      
  networks:
    mern-network:
      driver: bridge

  volumes:
    mongo-data:
